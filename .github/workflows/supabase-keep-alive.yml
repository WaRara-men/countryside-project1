name: Supabase Keep Alive

on:
  schedule:
    # 毎日（UTC 0:00 = 日本時間 9:00）実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行も可能に

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          
          if [ -z "$URL" ]; then
            echo "❌ ERROR: NEXT_PUBLIC_SUPABASE_URL is EMPTY"
            exit 1
          fi
          
          echo "📡 Pinging Supabase..."
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${URL}/rest/v1/wildlife_alerts?select=count" \
          -H "apikey: ${KEY}" \
          -H "Authorization: Bearer ${KEY}")
          
          echo "✅ Response Status: $STATUS"
          
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 201 ] || [ "$STATUS" -eq 204 ]; then
            echo "Successfully pinged Supabase"
          else
            echo "Failed to ping Supabase (Status: $STATUS)"
            exit 1
          fi
