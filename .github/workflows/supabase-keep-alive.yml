name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          # シークレットを取得し、前後の空白や改行を完全に除去
          RAW_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          CLEAN_URL=$(echo "$RAW_URL" | tr -d '[:space:]')
          
          if [ -z "$CLEAN_URL" ]; then
            echo "❌ ERROR: NEXT_PUBLIC_SUPABASE_URL is empty"
            exit 1
          fi

          # URLが http から始まっていない場合は補完
          if [[ $CLEAN_URL != http* ]]; then
            CLEAN_URL="https://$CLEAN_URL"
          fi
          
          # 末尾の / を削除
          CLEAN_URL=${CLEAN_URL%/}

          echo "📡 Target URL: ${CLEAN_URL}"
          
          # シンプルにAPIのベースURLを叩く
          # 200じゃなくても「404」や「401」が返ってくれば、サーバーは動いている証拠
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$CLEAN_URL/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          --max-time 15)
          
          echo "✅ Status Code: $STATUS"
          
          if [ "$STATUS" -ne 000 ]; then
            echo "Success! Supabase responded."
          else
            echo "❌ Connection failed. Check if the URL is correct or if Supabase is still paused."
            exit 1
          fi
